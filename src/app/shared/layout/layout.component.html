<mat-toolbar color="primary" class="navbar">
  <button mat-icon-button (click)="toggleSidenav()" class="menu-button">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="spacer"></span>
  <span class="username">{{ username }}</span>
  <button mat-icon-button [matMenuTriggerFor]="userMenu">
    <mat-icon>account_circle</mat-icon>
  </button>
</mat-toolbar>

<mat-menu #userMenu="matMenu">
  <button mat-menu-item disabled *ngIf="isAdmin">
    <mat-icon>admin_panel_settings</mat-icon>
    <span>Administrador</span>
  </button>
  <mat-divider *ngIf="isAdmin"></mat-divider>
  <button mat-menu-item (click)="logout()">
    <mat-icon>logout</mat-icon>
    <span>Cerrar Sesión</span>
  </button>
</mat-menu>

<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav class="sidenav" [mode]="isMobile ? 'over' : 'side'" [opened]="!isMobile">
    <mat-toolbar color="primary" class="sidenav-header">
      <span>MENÚ</span>
    </mat-toolbar>
    <mat-nav-list>
      <mat-list-item
        *ngFor="let link of navLinksFiltered"
        [routerLink]="link.route"
        routerLinkActive="active-menu-item"
        [routerLinkActiveOptions]="{exact: false}"
        (click)="closeSidenav()">
        <mat-icon matListItemIcon>{{ link.icon }}</mat-icon>
        <span matListItemTitle>{{ link.label }}</span>
      </mat-list-item>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <ng-content></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>
