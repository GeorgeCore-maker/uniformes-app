<div mat-dialog-title class="dialog-title-container">
  <h1>{{ isEditing ? 'Editar Categoría' : 'Nueva Categoría' }}</h1>
</div>
<mat-dialog-content>
  <form [formGroup]="formulario">
    <mat-form-field class="full-width">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre" placeholder="Nombre de la categoría">
      <mat-error *ngIf="nombreControl?.hasError('required')">El nombre es requerido</mat-error>
      <mat-error *ngIf="nombreControl?.hasError('minlength')">Mínimo 3 caracteres</mat-error>
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Descripción</mat-label>
      <textarea matInput formControlName="descripcion" placeholder="Descripción de la categoría" rows="4"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="guardar()" [disabled]="!formulario.valid">Guardar</button>
</mat-dialog-actions>
