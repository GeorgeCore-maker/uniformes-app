<div class="inventario-container">
  <h1>Gestión de Inventario</h1>

  <div class="search-section">
    <mat-form-field>
      <mat-label>Buscar producto</mat-label>
      <input matInput [(ngModel)]="filtro" (ngModelChange)="actualizarFiltro()" placeholder="Nombre del producto...">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <table mat-table [dataSource]="productosFiltrados" class="tabla-inventario">
    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let element">{{ element.id }}</td>
    </ng-container>

    <!-- Nombre Column -->
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Producto</th>
      <td mat-cell *matCellDef="let element">{{ element.nombre }}</td>
    </ng-container>

    <!-- Stock Column -->
    <ng-container matColumnDef="stock">
      <th mat-header-cell *matHeaderCellDef>Stock Actual</th>
      <td mat-cell *matCellDef="let element">{{ element.stock }}</td>
    </ng-container>

    <!-- Stock Mínimo Column -->
    <ng-container matColumnDef="stockMinimo">
      <th mat-header-cell *matHeaderCellDef>Stock Mínimo</th>
      <td mat-cell *matCellDef="let element">{{ element.stockMinimo }}</td>
    </ng-container>

    <!-- Estado Column -->
    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let element">
        <mat-chip [color]="getEstadoColor(element.estado)" selected>
          {{ element.estado }}
        </mat-chip>
      </td>
    </ng-container>

    <!-- Acciones Column -->
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="primary" (click)="reordenar(element.id)"
                [disabled]="element.estado === 'NORMAL'"
                matTooltip="Generar orden de compra">
          <mat-icon>add_shopping_cart</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <div *ngIf="productosFiltrados.length === 0" class="empty-state">
    <mat-icon>inventory_2</mat-icon>
    <p>No se encontraron productos</p>
  </div>
</div>
