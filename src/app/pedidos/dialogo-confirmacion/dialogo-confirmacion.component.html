<div class="dialog-title-container">
  <h2>{{ data.titulo }}</h2>
</div>

<mat-dialog-content>
  <p>{{ data.mensaje }}</p>
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-raised-button (click)="cancelar()">
    Cancelar
  </button>
  <button mat-raised-button color="warn" (click)="confirmar()">
    Confirmar
  </button>
</mat-dialog-actions>
