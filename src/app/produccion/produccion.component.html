<div class="produccion-container">
  <h1>Gestión de Producción</h1>

  <div class="filter-section">
    <mat-form-field>
      <mat-label>Filtrar por estado</mat-label>
      <mat-select [(ngModel)]="filtroEstado" (ngModelChange)="actualizarFiltro()">
        <mat-option *ngFor="let estado of estadosDisponibles" [value]="estado">
          {{ estado }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <table mat-table [dataSource]="pedidosFiltrados" class="tabla-produccion">
    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let element">{{ element.id }}</td>
    </ng-container>

    <!-- Número Column -->
    <ng-container matColumnDef="numero">
      <th mat-header-cell *matHeaderCellDef>Número Pedido</th>
      <td mat-cell *matCellDef="let element">{{ element.numero }}</td>
    </ng-container>

    <!-- Cliente Column -->
    <ng-container matColumnDef="cliente">
      <th mat-header-cell *matHeaderCellDef>Cliente</th>
      <td mat-cell *matCellDef="let element">{{ element.cliente }}</td>
    </ng-container>

    <!-- Cantidad Column -->
    <ng-container matColumnDef="cantidad">
      <th mat-header-cell *matHeaderCellDef>Cantidad</th>
      <td mat-cell *matCellDef="let element">{{ element.cantidad }} unidades</td>
    </ng-container>

    <!-- Estado Column -->
    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let element">
        <mat-chip [color]="getEstadoColor(element.estado)" selected>
          {{ element.estado }}
        </mat-chip>
      </td>
    </ng-container>

    <!-- Acciones Column -->
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="primary" (click)="cambiarEstado(element)"
                [matTooltip]="element.estado === 'EN_CONFECCION' ? 'Marcar como terminado' : 'Volver a confección'">
          <mat-icon>{{ element.estado === 'EN_CONFECCION' ? 'check_circle' : 'edit' }}</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <div *ngIf="pedidosFiltrados.length === 0" class="empty-state">
    <mat-icon>build</mat-icon>
    <p>No hay pedidos en producción</p>
  </div>
</div>
