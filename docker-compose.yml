# Docker Compose para Fase 2 - PostgreSQL
# docker-compose.yml

version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: uniformes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: uniformes_db
      POSTGRES_USER: uniformes
      POSTGRES_PASSWORD: uniformes123
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - uniformes_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uniformes -d uniformes_db"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Aplicación Backend (API)
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres
    container_name: uniformes-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://uniformes:uniformes123@postgres:5432/uniformes_db
      - NODE_ENV=production
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - uniformes_network
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs

  # Aplicación Frontend (Angular) - Opcional para desarrollo
  web:
    image: nginx:alpine
    container_name: uniformes-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
    networks:
      - uniformes_network

  # Redis para cache (opcional)
  redis:
    image: redis:7-alpine
    container_name: uniformes-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - uniformes_network

  # Adminer para administración de DB
  adminer:
    image: adminer:latest
    container_name: uniformes-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - uniformes_network
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  uniformes_network:
    driver: bridge
